# F03A Render — V2 Voix Off
name: F03A Render V2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'

permissions:
  contents: write

jobs:
  f03a:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd alpha/F03_RENDER/F03A_REMOTION/CODEBASE
          npm install

      - name: Verify video exists
        run: |
          VIDEO="alpha/F03_RENDER/F03A_REMOTION/CODEBASE/public/video_coupee.mp4"
          if [ -f "$VIDEO" ]; then
            SIZE=$(stat -c%s "$VIDEO")
            echo "Video found: $(du -h $VIDEO | cut -f1)"
            if [ "$SIZE" -lt 10240 ]; then
              echo "ERROR: Video too small (<10KB) — aborting"
              exit 1
            fi
          else
            echo "ERROR: video_coupee.mp4 not found at $VIDEO"
            exit 1
          fi

      - name: Render
        run: |
          cd alpha/F03_RENDER/F03A_REMOTION/CODEBASE
          mkdir -p OUT
          npx remotion render src/index.jsx OmniComposition OUT/video_visuelle.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f03a-output
          path: alpha/F03_RENDER/F03A_REMOTION/CODEBASE/OUT/video_visuelle.mp4

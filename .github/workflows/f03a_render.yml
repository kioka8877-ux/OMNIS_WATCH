# F03A REMOTION — Rendu visuel
# Trigger: workflow_dispatch (manuel)
name: F03A Render

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'

permissions:
  contents: write

jobs:
  f03a:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd alpha/F03_RENDER/F03A_REMOTION/CODEBASE
          npm install

      - name: Copy input files
        run: |
          mkdir -p alpha/F03_RENDER/F03A_REMOTION/CODEBASE/public
          cp alpha/F03_RENDER/F03A_REMOTION/IN/codex.json alpha/F03_RENDER/F03A_REMOTION/CODEBASE/public/codex.json
          cp alpha/F03_RENDER/F03A_REMOTION/IN/video_coupee.mp4 alpha/F03_RENDER/F03A_REMOTION/CODEBASE/public/video_coupee.mp4

      - name: Render with Remotion
        run: |
          cd alpha/F03_RENDER/F03A_REMOTION/CODEBASE
          FPS=$(python3 -c "import json; print(json.load(open('public/codex.json'))['video']['fps'])")
          FRAMES=$(python3 -c "import json; print(json.load(open('public/codex.json'))['video']['total_frames'])")
          WIDTH=$(python3 -c "import json; print(json.load(open('public/codex.json'))['video']['width'])")
          HEIGHT=$(python3 -c "import json; print(json.load(open('public/codex.json'))['video']['height'])")
          
          echo "Rendu: ${FRAMES} frames, ${FPS}fps, ${WIDTH}x${HEIGHT}"
          
          npx remotion render src/index.jsx OmniComposition \
            OUT/video_visuelle.mp4 \
            --codec h264 \
            --image-format jpeg \
            --concurrency 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f03a-output
          path: alpha/F03_RENDER/F03A_REMOTION/CODEBASE/OUT/

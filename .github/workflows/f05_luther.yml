name: F05 Luther

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'

permissions:
  contents: write

jobs:
  f05:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run F05 Luther
        run: |
          cd alpha/F05_LUTHER/CODEBASE
          python3 omnis_f05_luther.py \
            --input ../IN/ \
            --output ../OUT/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f05-output
          path: alpha/F05_LUTHER/OUT/

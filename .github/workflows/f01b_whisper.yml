# F01B Whisper — Transcription
name: F01B Whisper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'
      model:
        description: 'Whisper model (tiny/base/small/medium)'
        required: false
        default: 'base'

permissions:
  contents: write

jobs:
  f01b:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install faster-whisper
        run: pip install faster-whisper --quiet

      - name: Run F01B Whisper
        run: |
          cd alpha/F01_AUDIO/F01B_WHISPER/CODEBASE
          python3 omnis_f01b_whisper.py \
            --input ../IN/ \
            --output ../OUT/ \
            --model ${{ github.event.inputs.model }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f01b-output
          path: alpha/F01_AUDIO/F01B_WHISPER/OUT/timing.json

# F04 CAMOUFLAGE — Nettoyage + Loudnorm (FFmpeg)
name: F04 Camouflage

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'

permissions:
  contents: write

jobs:
  f04:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run F04 Camouflage
        run: |
          cd alpha/F04_CAMOUFLAGE/CODEBASE
          python3 omnis_f04.py \
            --input ../IN/ \
            --output ../OUT/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f04-output
          path: alpha/F04_CAMOUFLAGE/OUT/

# F03B Mixer — V2 Voix Off
# Mixe la voix off (audio_clean.mp3) + SFX sur la vidéo de F03A
name: F03B Mixer V2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'

permissions:
  contents: write

jobs:
  f03b:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run F03B Mixer
        run: |
          cd alpha/F03_RENDER/F03B_MIXER/CODEBASE
          python3 omnis_f03b_mixer.py \
            --input ../IN/ \
            --output ../OUT/ \
            --sfx-dir ../../../SHARED/IN/sfx/ \
            --voiceover ../../../F01_AUDIO/F01A_CASTELLAN/OUT/audio_clean.mp3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f03b-output
          path: alpha/F03_RENDER/F03B_MIXER/OUT/video_complete.mp4

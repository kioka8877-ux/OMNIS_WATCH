# F01 ACQUISITION — Decoupe video (FFmpeg)
name: F01 Acquisition

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'
      in_timestamp:
        description: 'Timestamp IN (ex: 00:02)'
        required: true
        default: '00:00'
      out_timestamp:
        description: 'Timestamp OUT (ex: 00:15)'
        required: true
        default: '00:15'
      format:
        description: 'Format (9:16, 16:9, 1:1)'
        required: true
        default: '9:16'
      blur_pad:
        description: 'Blur pad (true/false)'
        required: false
        default: 'true'
      speed:
        description: 'Vitesse (ex: 1.0)'
        required: false
        default: '1.0'
      volume:
        description: 'Volume (ex: 1.0)'
        required: false
        default: '1.0'

permissions:
  contents: write

jobs:
  f01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run F01 Acquisition
        run: |
          cd alpha/F01_ACQUISITION/CODEBASE
          python3 omnis_f01.py \
            --input ../IN/ \
            --output ../OUT/ \
            --in-timestamp "${{ github.event.inputs.in_timestamp }}" \
            --out-timestamp "${{ github.event.inputs.out_timestamp }}" \
            --format "${{ github.event.inputs.format }}" \
            --blur-pad "${{ github.event.inputs.blur_pad }}" \
            --speed "${{ github.event.inputs.speed }}" \
            --volume "${{ github.event.inputs.volume }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f01-output
          path: alpha/F01_ACQUISITION/OUT/

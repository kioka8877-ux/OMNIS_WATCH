# F02A VISION — Tracking MediaPipe
name: F02A Tracking

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (alpha)'
        required: true
        default: 'alpha'
      target_type:
        description: 'Cible (face, hand, dog, cat, person)'
        required: true
        default: 'face'

permissions:
  contents: write

jobs:
  f02a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mediapipe opencv-python-headless

      - name: Run F02A Tracking
        run: |
          cd alpha/F02_ANALYSIS/F02A_VISION/CODEBASE
          python3 omnis_f02a_track.py \
            --input ../IN/ \
            --output ../OUT/ \
            --target "${{ github.event.inputs.target_type }}" \
            --smooth 5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f02a-output
          path: alpha/F02_ANALYSIS/F02A_VISION/OUT/
